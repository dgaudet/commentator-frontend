<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <!-- Dark theme gradient: blue to dark -->
      <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rectangle with gradient -->
  <rect width="2560" height="1440" fill="url(#darkGradient)" />
</svg>
